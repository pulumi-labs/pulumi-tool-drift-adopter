name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -tags=unit -v -race -coverprofile=coverage-unit.out ./...

      - name: Upload unit test coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-unit.out
          flags: unit
          name: unit-${{ matrix.go-version }}

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node.js (for TypeScript validation)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python (for Python validation)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test -tags=integration -v -race -coverprofile=coverage-integration.out ./...

      - name: Upload integration test coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-integration.out
          flags: integration
          name: integration

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit, integration]
    # Only run E2E tests manually or on main branch
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Download dependencies
        run: go mod download

      - name: Run E2E tests
        run: go test -tags=e2e -v -timeout=30m ./e2e/...
        env:
          # E2E tests will need these for real testing
          # For now, they can be empty/mock
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload E2E test coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-e2e.out
          flags: e2e
          name: e2e

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit, integration]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run all tests with coverage
        run: |
          go test -tags=unit -coverprofile=coverage-unit.out ./...
          go test -tags=integration -coverprofile=coverage-integration.out ./...

      - name: Generate coverage report
        run: |
          go tool cover -func=coverage-unit.out
          go tool cover -func=coverage-integration.out

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-unit.out,./coverage-integration.out
          flags: combined
          name: combined-coverage
