# golangci-lint configuration
# See https://golangci-lint.run/usage/configuration/

version: "2"

linters:
  enable:
    # Default linters (enabled automatically):
    # - errcheck
    # - govet
    # - ineffassign
    # - staticcheck (includes gosimple)
    # - unused

    # Additional useful linters:
    - revive        # Fast, configurable, extensible, flexible, and beautiful linter
    - misspell      # Finds commonly misspelled English words
    - gocyclo       # Computes cyclomatic complexity
    - dupl          # Detects code cloning

  settings:
    revive:
      rules:
        - name: var-naming
          disabled: true
        - name: exported
          disabled: false
        - name: error-return
          disabled: false
        - name: error-naming
          disabled: false

    gocyclo:
      min-complexity: 20

    dupl:
      threshold: 100

  exclusions:
    rules:
      # Exclude test files from certain checks
      - path: _test\.go
        linters:
          - errcheck
          - dupl
          - gocyclo

formatters:
  enable:
    - gofmt         # Checks code formatting
    - goimports     # Checks import formatting

  settings:
    goimports:
      local-prefixes:
        - github.com/pulumi-labs/pulumi-tool-drift-adopter

run:
  timeout: 5m
  tests: true
  build-tags:
    - unit
